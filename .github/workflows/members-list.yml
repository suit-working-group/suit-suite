name: Update participants list

# When a registration is validated (a MEMBERS/ or SUPPORTERS/ file is merged to
# main), regenerate the participants section of README.md and commit it back.
# The commit only touches README.md, which is outside the paths filter, so it
# does not re-trigger this workflow (the [skip ci] marker is a second guard).

on:
  push:
    branches: [main]
    paths:
      - 'MEMBERS/**'
      - 'SUPPORTERS/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate participants list
        run: node scripts/build-members-list.mjs
      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "Participants list already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: refresh participants list [skip ci]"
          git push
